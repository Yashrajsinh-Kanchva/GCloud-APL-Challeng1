<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | StadiumFlow</title>
    <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/heatmap.css">
</head>
<body class="pt-32 pb-16 bg-[#02040a] text-white">
    <!-- Navbar Placeholder -->
    <div id="navbar"></div>

    <main class="sf-container animate-fade-in" id="adminMainContainer">
        <!-- Dashboard Header -->
        <header id="adminHeader" class="flex flex-col md:flex-row justify-between items-start md:items-end mb-16 gap-8">
            <div class="relative">
                <div class="absolute -left-4 top-1/2 -translate-y-1/2 w-1 h-12 bg-accent rounded-full shadow-[0_0_15px_var(--accent-glow)]"></div>
                <h1 class="text-5xl md:text-7xl font-black mb-3 tracking-tighter pl-6">Admin <span class="text-accent">Panel</span></h1>
                <p class="text-muted font-bold uppercase tracking-[0.4em] text-[0.7rem] opacity-80 pl-6">Centralized Command & Vendor Management</p>
            </div>
        </header>

        <!-- Dynamic User Sections -->
        <div id="admin-home" class="admin-section hidden w-full"></div>
        <div id="admin-dashboard" class="admin-section hidden w-full"></div>
        <div id="admin-heatmap" class="admin-section hidden w-full"></div>

        <!-- Tab: Manage Shops -->
        <section id="manage-shops" class="admin-section hidden">
            <!-- Add Shop Form -->
            <div class="glass-panel p-8 mb-10 rounded-2xl">
                <h3 class="text-lg font-black text-white tracking-tight mb-6 flex items-center gap-3">
                    <i class="fa-solid fa-circle-plus text-accent"></i> Add New Shop
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
                    <input id="adminShopName" type="text" placeholder="Shop Name (e.g. Punjab Grill Express)" class="form-input" />
                    <input id="adminShopTagline" type="text" placeholder="Tagline (e.g. Pure Veg Street Delights)" class="form-input" />
                    <input id="adminShopIcon" type="text" placeholder="Icon emoji (e.g. 🍕)" class="form-input" />
                </div>
                <button id="adminAddShopBtn" class="btn btn-primary">
                    ADD SHOP <i class="fa-solid fa-plus ml-2"></i>
                </button>
            </div>

            <!-- Shops Grid -->
            <div id="adminShopsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-10">
                <!-- Dynamically populated -->
            </div>
        </section>

        <!-- Tab: Requests -->
        <section id="requests" class="admin-section hidden">
            <div id="requestsList" class="space-y-4">
                <!-- Dynamically populated -->
            </div>
            <div id="noRequests" class="hidden flex flex-col items-center justify-center py-20 opacity-30">
                <i class="fa-solid fa-inbox text-6xl mb-6"></i>
                <p class="font-black uppercase tracking-widest text-sm">No Pending Requests</p>
            </div>
        </section>

        <!-- Add Item Modal -->
        <div id="addItemModal" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[3000] hidden flex items-center justify-center transition-all duration-300">
            <div class="bg-[#02040a] border border-white/10 rounded-[2rem] max-w-md w-full mx-4 p-8 shadow-[0_0_150px_rgba(0,229,255,0.05)] animate-fade-in">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-black tracking-tighter text-white">Add Item</h2>
                    <button id="closeItemModal" class="text-muted hover:text-white text-xl transition-colors"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <input type="hidden" id="modalShopId" />
                <div class="space-y-4 mb-6">
                    <input id="modalItemName" type="text" placeholder="Item Name (e.g. Paneer Wrap)" class="form-input" />
                    <input id="modalItemPrice" type="number" placeholder="Price (₹)" class="form-input" />
                    <input id="modalItemIcon" type="text" placeholder="Icon emoji (e.g. 🌮)" class="form-input" />
                </div>
                <button id="modalAddItemBtn" class="btn btn-primary w-full py-4 text-xs font-black">
                    ADD ITEM <i class="fa-solid fa-plus ml-2"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer"></div>

    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/adminDashboard.js"></script>
</body>
</html>
