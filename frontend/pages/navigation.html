<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navigation | StadiumFlow</title>
    <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico">
    <meta name="description" content="Congestion-aware pathfinding with multi-route comparison for StadiumFlow stadium navigation.">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="../css/heatmap.css">
</head>
<body class="pt-32 pb-16 min-h-screen flex flex-col bg-[#02040a] text-white">
    <!-- Navbar Placeholder -->
    <div id="navbar"></div>

    <main class="sf-container animate-fade-in flex-1">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-end mb-12 gap-8">
            <div>
                <h1 class="text-5xl md:text-6xl font-black mb-3 tracking-tighter">Spatial <span class="text-accent">Guidance</span></h1>
                <p class="text-muted font-bold uppercase tracking-[0.3em] text-[0.7rem] opacity-80">Congestion-Aware Pathfinding &amp; Multi-Route Comparison</p>
            </div>
            <div class="glass-panel px-8 py-4 rounded-2xl flex items-center gap-6 bg-white/[0.03] border-accent/20">
                <div class="flex items-center gap-3 bg-accent/10 px-3 py-1 rounded-full border border-accent/20">
                    <span class="w-2 h-2 bg-accent rounded-full animate-pulse shadow-[0_0_12px_#00e5ff]"></span>
                    <span class="text-[0.6rem] font-black text-accent uppercase tracking-[0.2em]">Live Wayfinding</span>
                </div>
                <div id="liveClock" class="font-mono font-bold text-2xl text-white tracking-widest text-shadow-glow">00:00:00</div>
            </div>
        </header>

        <div class="find-seat-layout grid grid-cols-1 lg:grid-cols-4 gap-8 items-start">
            <!-- Sidebar Controls -->
            <div class="route-sidebar space-y-6 lg:col-span-1">
                <div class="glass-panel p-6 md:p-8 bg-white/[0.01]">
                    <h3 class="text-muted font-black mb-8 text-[0.65rem] flex items-center gap-3 uppercase tracking-[0.3em]">
                        <i class="fa-solid fa-route text-accent"></i>
                        Node Configuration
                    </h3>
                    <form id="seatForm" class="space-y-8">
                        <div>
                            <label class="block text-[0.6rem] font-black text-muted uppercase tracking-[0.25em] mb-4">Starting Entry Node</label>
                            <select id="gateSelect" class="form-input cursor-pointer appearance-none">
                                <option value="Gate 1" class="bg-[#02040a]">Gate 1 (North)</option>
                                <option value="Gate 2" class="bg-[#02040a]">Gate 2 (East)</option>
                                <option value="Gate 3" class="bg-[#02040a]">Gate 3 (South)</option>
                                <option value="Gate 4" class="bg-[#02040a]">Gate 4 (West)</option>
                            </select>
                        </div>
                        <div>
                             <label class="block text-[0.6rem] font-black text-muted uppercase tracking-[0.25em] mb-4">Target Seating Zone</label>
                             <select id="sectionSelect" class="form-input cursor-pointer appearance-none">
                                 <option value="A" class="bg-[#02040a]">Section A</option>
                                 <option value="B" class="bg-[#02040a]">Section B</option>
                                 <option value="C" class="bg-[#02040a]">Section C</option>
                                 <option value="D" class="bg-[#02040a]">Section D</option>
                                 <option value="E" class="bg-[#02040a]">Section E</option>
                                 <option value="F" class="bg-[#02040a]">Section F</option>
                                 <option value="G" class="bg-[#02040a]">Section G</option>
                                 <option value="H" class="bg-[#02040a]">Section H</option>
                                 <option value="I" class="bg-[#02040a]">Section I</option>
                                 <option value="J" class="bg-[#02040a]">Section J</option>
                                 <option value="K" class="bg-[#02040a]">Section K</option>
                                 <option value="L" class="bg-[#02040a]">Section L</option>
                                 <option value="M" class="bg-[#02040a]">Section M</option>
                                 <option value="N" class="bg-[#02040a]">Section N</option>
                             </select>
                        </div>
                        <button type="submit" id="findRouteBtn" class="btn btn-primary w-full py-5 text-xs font-black shadow-[0_10px_25px_rgba(0,229,255,0.2)]">
                            COMPARE ROUTES <i class="fa-solid fa-code-compare ml-2 text-[0.6rem]"></i>
                        </button>
                    </form>
                </div>

                <!-- Route Results Panel — scrollable to fit 3 cards -->
                <div id="distanceDisplay" class="glass-panel p-6 md:p-8 bg-white/[0.01] transition-all overflow-y-auto max-h-[680px]">
                    <div class="space-y-4">
                        <div>
                            <div class="text-slate-400 text-[0.6rem] uppercase font-black tracking-widest mb-2">Guidance Status</div>
                            <div class="text-white text-lg font-black tracking-tight">Ready</div>
                        </div>
                        <p class="text-[0.75rem] text-slate-400 leading-relaxed">Choose your gate and seating section to compare route options.</p>
                    </div>
                </div>
            </div>

            <!-- Map Viewport -->
            <div class="route-map-panel lg:col-span-3 glass-panel p-4 md:p-8 flex flex-col items-center justify-center relative overflow-hidden group border-white/10 bg-black/20">
                <div class="absolute inset-0 bg-accent/[0.02] opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
                <div class="route-canvas-frame relative w-full flex justify-center items-center aspect-[900/700]">
                    <canvas id="findSeatCanvas" width="900" height="700" class="stadium-map w-full h-full object-contain"></canvas>
                    <div id="tooltip"></div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer Placeholder -->
    <div id="footer"></div>

    <script type="module" src="../js/layout.js"></script>
    <script type="module" src="../js/main.js"></script>
</body>
</html>
