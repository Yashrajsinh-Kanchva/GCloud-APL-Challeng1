<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome | StadiumFlow</title>
    <link rel="icon" type="image/x-icon" href="../assets/icons/favicon.ico">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link rel="stylesheet" href="../css/styles.css">
    <style>
        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at top right, rgba(0, 229, 255, 0.1), transparent 40%),
                radial-gradient(circle at bottom left, rgba(157, 0, 255, 0.1), transparent 40%);
            min-height: 100vh;
            overflow-x: hidden;
        }
        .main-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 40px 24px;
        }
    </style>
</head>
<body class="animate-fade-in">
    <main class="main-container">
        <div class="max-w-lg w-full">
            <div class="text-center mb-12">
                <div class="w-16 h-16 bg-accent rounded-2xl flex items-center justify-center mx-auto mb-6 shadow-[0_0_30px_rgba(0,229,255,0.4)] rotate-3">
                    <i class="fa-solid fa-bolt-lightning text-dark text-3xl"></i>
                </div>
                <h1 class="text-5xl font-black text-white tracking-tighter mb-3">Stadium<span class="text-accent">Flow</span></h1>
                <p class="text-muted text-sm font-bold uppercase tracking-[0.2em] opacity-80">Select Your Role</p>
            </div>

            <div class="space-y-6">
                <!-- Audience -->
                <button id="roleAudience" class="w-full glass-panel p-8 rounded-[2rem] border border-white/5 hover:border-accent/40 hover:bg-accent/[0.03] transition-all group flex items-center gap-8 text-left outline-none hover:shadow-[0_0_50px_rgba(0,229,255,0.08)]">
                    <div class="w-16 h-16 rounded-2xl bg-accent/10 text-accent flex items-center justify-center text-3xl group-hover:scale-110 transition-all duration-500 shadow-[0_0_20px_rgba(0,229,255,0.1)] shrink-0 border border-accent/20">
                        <i class="fa-solid fa-user"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-white font-black text-xl mb-1 tracking-tight">Audience</h3>
                        <p class="text-[0.75rem] text-slate-400 font-medium">Explore stadium, order food & navigate</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-accent/10 transition-colors">
                        <i class="fa-solid fa-chevron-right text-muted group-hover:text-accent transition-all group-hover:translate-x-1"></i>
                    </div>
                </button>

                <!-- Admin -->
                <button id="roleAdmin" class="w-full glass-panel p-8 rounded-[2rem] border border-white/5 hover:border-indigo-500/40 hover:bg-indigo-500/[0.03] transition-all group flex items-center gap-8 text-left outline-none hover:shadow-[0_0_50px_rgba(99,102,241,0.08)]">
                    <div class="w-16 h-16 rounded-2xl bg-indigo-500/10 text-indigo-500 flex items-center justify-center text-3xl group-hover:scale-110 transition-all duration-500 shadow-[0_0_20px_rgba(99,102,241,0.1)] shrink-0 border border-indigo-500/20">
                        <i class="fa-solid fa-shield-halved"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-white font-black text-xl mb-1 tracking-tight">System Admin</h3>
                        <p class="text-[0.75rem] text-slate-400 font-medium">Manage shops, items & approve requests</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-indigo-500/10 transition-colors">
                        <i class="fa-solid fa-chevron-right text-muted group-hover:text-indigo-500 transition-all group-hover:translate-x-1"></i>
                    </div>
                </button>

                <!-- Shop Admin -->
                <button id="roleShopAdmin" class="w-full glass-panel p-8 rounded-[2rem] border border-white/5 hover:border-emerald-500/40 hover:bg-emerald-500/[0.03] transition-all group flex items-center gap-8 text-left outline-none hover:shadow-[0_0_50px_rgba(16,185,129,0.08)]">
                    <div class="w-16 h-16 rounded-2xl bg-emerald-500/10 text-emerald-500 flex items-center justify-center text-3xl group-hover:scale-110 transition-all duration-500 shadow-[0_0_20px_rgba(16,185,129,0.1)] shrink-0 border border-emerald-500/20">
                        <i class="fa-solid fa-store"></i>
                    </div>
                    <div class="flex-1">
                        <h3 class="text-white font-black text-xl mb-1 tracking-tight">Merchant Node</h3>
                        <p class="text-[0.75rem] text-slate-400 font-medium">Register shop, add items & track requests</p>
                    </div>
                    <div class="w-10 h-10 rounded-full bg-white/5 flex items-center justify-center group-hover:bg-emerald-500/10 transition-colors">
                        <i class="fa-solid fa-chevron-right text-muted group-hover:text-emerald-500 transition-all group-hover:translate-x-1"></i>
                    </div>
                </button>
            </div>
        </div>
    </main>

    <script type="module" src="../js/layout.js"></script>
    <script type="module">
        import { setRole } from '../js/storeManager.js';

        document.getElementById('roleAudience').addEventListener('click', () => {
            setRole('audience');
            window.location.href = '/pages/login.html';
        });

        document.getElementById('roleAdmin').addEventListener('click', () => {
            setRole('admin');
            window.location.href = '/pages/admin-dashboard.html';
        });

        document.getElementById('roleShopAdmin').addEventListener('click', () => {
            setRole('shop_admin');
            window.location.href = '/pages/shop-admin.html';
        });
    </script>
</body>
</html>
